services:
  postgres:
    image: postgres:16
    container_name: connecthub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: uma_senha_super_segura
      POSTGRES_DB: connecthub_db
    ports:
      - "5433:5432"
    volumes:
      - connecthub_postgres_data:/var/lib/postgresql/data

volumes:
  connecthub_postgres_data:
